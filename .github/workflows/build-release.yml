name: Build & attach DMG to release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to attach DMG to (e.g. v0.2.0)"
        required: true
        default: "v0.2.3"

jobs:
  build-dmg:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ai-agent
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip

          # Install torch CPU-only first (~250MB vs ~700MB GPU version)
          ./venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu

          # Install remaining deps (torch already installed above, won't re-download)
          ./venv/bin/pip install -r requirements.txt

          # Install playwright browsers (needed for bundling)
          ./venv/bin/playwright install chromium

          ./venv/bin/pip install pyinstaller

      - name: Check disk space
        run: df -h /

      - name: Build Oculo.app
        working-directory: ai-agent
        run: bash build/macos/build_app.sh

      - name: Check dist size
        run: du -sh ai-agent/dist/Oculo.app 2>/dev/null || echo "No .app found"

      - name: Create DMG
        working-directory: ai-agent
        run: bash build/macos/make_dmg.sh

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          gh release upload "$TAG" ai-agent/dist/Oculo.dmg --clobber
